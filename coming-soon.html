<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Skill Pinnacle</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Coming Soon Page Specific Styles */
        :root {
            --primary: #4F46E5;
            --grad-1: #06B6D4;
            --grad-2: #8B5CF6;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --font: 'Plus Jakarta Sans', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: var(--font);
            background: #020617;
            color: white;
            overflow: hidden;
        }

        .bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.4) saturate(1.2);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(2, 6, 23, 0.7) 100%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .logo-container {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .brand-name {
            text-decoration: none;
        }

        .brand-name h2 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: white;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .content-box {
            max-width: 800px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 60px 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: fadeInScale 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.25rem;
            color: #94a3b8;
            margin-bottom: 48px;
            font-weight: 500;
            line-height: 1.6;
        }

        /* Form Styles */
        .signup-form {
            display: flex;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        .input-group {
            flex-grow: 1;
        }

        input[type="email"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 24px;
            border-radius: 16px;
            color: white;
            font-family: var(--font);
            font-size: 1rem;
            transition: all 0.3s;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-submit:hover {
            background: var(--grad-2);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .social-link {
            color: #64748b;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .social-link:hover {
            color: white;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .signup-form { flex-direction: column; }
            .content-box { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="bg-video-container">
        <video autoplay loop muted playsinline class="bg-video">
            <source src="assets/bg.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="overlay"></div>
    </div>

    <div class="container">
        <header class="logo-container">
            <a href="index.html" class="brand-name">
                <h2>Skill Pinnacle</h2>
            </a>
        </header>

        <main class="content-box">
            <h1>Coming Soon</h1>
            <p class="subtitle">We're building the future of corporate training. Something amazing is about to launch. Stay tuned for transformative learning experiences.</p>
            
            <form class="signup-form" id="notify-form">
                <div class="input-group">
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="btn-submit">Notify Me</button>
            </form>
        </main>

        <footer class="footer">
            <a href="#" class="social-link">LinkedIn</a>
            <a href="#" class="social-link">Twitter</a>
            <a href="#" class="social-link">Instagram</a>
        </footer>
    </div>

    <script>
        // Handle form submission
        document.getElementById('notify-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = this.querySelector('input[type="email"]').value;
            if (email) {
                const btn = this.querySelector('.btn-submit');
                const originalText = btn.innerHTML;
                btn.innerHTML = 'Saved! ✨';
                btn.style.background = '#059669';
                this.querySelector('input[type="email"]').value = '';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = '';
                }, 3000);
            }
        });
    </script>
</body>
</html>
